vasp_PBE:
  name: Vasp
  module: ase.calculators.vasp
  precommands:
    - module load myvasp
  args:
    prec: Normal
    xc: PBE
    lreal: False
    command: srun --mpi=pmi2 vasp_std
    # See ASE vasp kpoints specification
    kpts: [1,1,1]
    # other parameters not specified through ASE can be set directly
    NCORE: 4

