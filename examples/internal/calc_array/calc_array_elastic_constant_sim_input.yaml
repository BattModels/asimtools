asimmodule: workflows.calc_array
workdir: env_results
args:
  calculators:
    - calc_id: emt
    - calc_id: lj_Cu
  env_ids: [inline, inline] # Must correspond to calculator if list is given
  subsim_input:
    asimmodule: elastic_constants.cubic_energy_expansion
    args:
      calculator:
        calc_id: emt
      image:
        name: Cu
        a: 3.6
      ase_cubic_eos_args: # The minimum for every calculator should be in the e-v range
